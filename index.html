<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abayat Al Omara</title>
<script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
<style>
body{font-family:tahoma;padding:15px;background:#fcfaf8;margin:0}
.box{max-width:550px;margin:auto;background:white;padding:20px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
#loginPage,#mainApp{display:none}
#loginPage{display:block;text-align:center;padding:40px 20px}
h2{text-align:center;color:#6b4f44;margin:5px 0}
.status-text{text-align:center;font-size:11px;color:#2a9d8f;margin-bottom:15px;font-weight:bold}
input,button,textarea,select{width:100%;padding:14px;margin:8px 0;border:1px solid #eee;border-radius:12px;box-sizing:border-box;font-size:14px}
.req{border: 1px solid #ff000045 !important; background: #fff5f5;}
button{background:#6b4f44;color:white;border:none;font-weight:bold;cursor:pointer}
.counter-box{text-align:center;background:#fdf6f2;padding:12px;border-radius:12px;margin-bottom:15px;font-size:13px;color:#6b4f44;font-weight:bold;line-height:2}
table{width:100%;margin-top:20px;border-collapse:collapse;font-size:10px}
th{background:#fdf6f2;color:#6b4f44;padding:8px}
td{border-bottom:1px solid #f9f9f9;padding:8px;text-align:center}
.report-area{margin-top:20px;padding:15px;background:#fff;border:2px solid #3a5a40;border-radius:15px;display:none}
.size-group{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
#editArea input, #editArea textarea {font-size: 12px; padding: 8px; margin: 4px 0;}
</style>
</head>
<body>

<div id="loginPage" class="box">
  <h2>🔐 دخول النظام</h2>
  <select id="userSelect">
    <option value="owner">صاحبة الحلال</option>
    <option value="naina">ناينا</option>
    <option value="other">أخرى</option>
    <option value="editor">Editor</option>
  </select>
  <input id="passInput" type="password" placeholder="الرقم السري">
  <button id="loginBtn">دخول</button>
</div>

<div id="mainApp" class="box">
  <h2 id="mainTitle">عبايات الأمراء</h2>
  <div class="status-text" id="statusLine">⏳ جاري التحميل...</div>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span id="userNameDisplay" style="font-weight:bold;color:#6b4f44"></span>
    <button onclick="location.reload()" style="width:auto;padding:5px 15px;background:#eee;color:#333;font-size:11px">خروج</button>
  </div>
  <hr>
  
  <div class="counter-box" id="counter"></div>

  <input id="invNum" class="req" placeholder="رقم الفاتورة *">
  <label style="font-size:12px;color:gray;display:block;text-align:right">تاريخ الفاتورة *</label>
  <input id="id" class="req" type="date">
  <input id="a" placeholder="اسم الزبونة">
  <input id="b" class="req" placeholder="رقم التلفون *">
  <input id="qty" placeholder="عدد العبايات">
  <input id="j" placeholder="رقم كود العباية">
  
  <div class="size-group">
    <input id="f1" placeholder="الكتف">
    <input id="f2" placeholder="الكم">
    <input id="f3" placeholder="الصدر">
    <input id="f" placeholder="الطول">
    <input id="f_hole" placeholder="الحفرة">
  </div>

  <div style="display:flex;gap:10px">
    <input id="g1" class="req" placeholder="العربون *" type="number">
    <input id="g2" class="req" placeholder="المتبقي *" type="number">
  </div>
  
  <select id="locSelect">
    <option value="محل">محل</option>
    <option value="معرض">Maarad</option>
    <option value="أونلاين">أونلاين</option>
  </select>

  <textarea id="k" placeholder="ملاحظات"></textarea>
  
  <button id="btnSave">حفظ الطلب ✅</button>
  <button id="btnDebt" style="background:#d62828; margin-top:5px;">💰 كشف المديونيات</button>

  <div id="adminPanel" style="display:none; margin-top:10px; display:flex; gap:5px;">
      <button id="btnMonthly" style="background:#3a5a40; flex:1">📊 ريبورت مفصل</button>
      <button id="btnYearly" style="background:#3a5a40; flex:1">📅 ريبورت سنوي</button>
  </div>

  <div id="reportBox" class="report-area">
    <h3 id="reportTitle" style="text-align:center;"></h3>
    <div id="reportContent" style="max-height:400px; overflow-y:auto;"></div>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button id="btnExportWord" style="background:#2b5797; flex:1;">📄 تحميل Word</button>
        <button onclick="document.getElementById('reportBox').style.display='none'" style="background:#444; flex:1;">إغلاق</button>
    </div>
  </div>

  <input id="z" placeholder="🔍 ابحث هنا..." style="margin-top:20px">
  
  <table id="mainTable">
    <thead>
        <tr>
            <th>الفاتورة</th>
            <th>الاسم</th>
            <th>التاريخ</th>
            <th>المتبقي</th>
            <th>عرض</th>
        </tr>
    </thead>
    <tbody id="t"></tbody>
  </table>

  <div id="detailsBox" style="display:none; border:2px solid #6b4f44; padding:15px; border-radius:15px; margin-top:15px; background:#fff">
    <div id="detHeader"></div>
    <div id="editArea" style="background:#f9f9f9; padding:10px; border-radius:12px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        </div>
    <div id="adminActions" style="margin-top:10px; display:flex; gap:5px;">
        <button id="btnUpdateFull" style="background:#2a9d8f; flex:1;">تحديث الكل ✅</button>
        <button id="btnDeleteFull" style="background:red; flex:1;">حذف 🗑️</button>
    </div>
    <button onclick="document.getElementById('detailsBox').style.display='none'" style="background:gray; width:100%; margin-top:10px">إغلاق</button>
  </div>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {getDatabase,ref,set,onValue} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDCSx-_o07zM_pqCeIFCdon25k7jQzZMJo",
  authDomain: "alomara-b5b95.firebaseapp.com",
  databaseURL: "https://alomara-b5b95-default-rtdb.firebaseio.com",
  projectId: "alomara-b5b95",
  storageBucket: "alomara-b5b95.firebasestorage.app",
  messagingSenderId: "208627786275",
  appId: "1:208627786275:web:3bd56f7eb2e964773b8796"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.d = [];
let onlyDebt = false;

onValue(ref(db,'abonat'),(s)=>{
    window.d = s.exists() ? s.val() : [];
    document.getElementById('statusLine').innerHTML = "✅ النظام متصل";
    r_table(); updateCounter();
});

window.login=()=>{
    let u=document.getElementById('userSelect').value, p=document.getElementById('passInput').value;
    if((u==='owner' && p==='4400') || (u==='naina' && p==='1234') || (u==='other' && p==='1357') || (u==='editor' && p==='98988')){
        window.role=u; window.currentUser=u;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainApp').style.display='block';
        if(u==='owner'||u==='editor') document.getElementById('adminPanel').style.display='flex';
        document.getElementById('userNameDisplay').textContent = "مرحباً: " + u;
    } else alert('خطأ!');
};

function r_table(){
    let term=document.getElementById('z').value.toLowerCase();
    let fd=window.d.filter(u=> (u.n && u.n.toLowerCase().includes(term)) || (u.p && u.p.includes(term)) || (u.inv && u.inv.includes(term)));
    if(onlyDebt) fd=fd.filter(u=>(parseFloat(u.v2)||0)>0);
    let h='';
    fd.forEach(u=>{
        let i=window.d.indexOf(u);
        h+=`<tr><td>${u.inv}</td><td>${u.n}</td><td>${u.id}</td><td style="color:red;font-weight:bold">${u.v2}</td><td><button onclick="showDet(${i})">عرض</button></td></tr>`;
    });
    document.getElementById('t').innerHTML=h;
}

window.showDet=(i)=>{
    let u=window.d[i];
    document.getElementById('detHeader').innerHTML = `<h3 style="margin:0 0 10px 0; color:#6b4f44">تعديل بيانات: ${u.n}</h3>`;
    let area = document.getElementById('editArea');
    area.innerHTML = `
        <input id="en" value="${u.n}" placeholder="الاسم"> <input id="ei" value="${u.inv}" placeholder="الفاتورة">
        <input id="ep" value="${u.p}" placeholder="الهاتف"> <input id="ed" type="date" value="${u.id}">
        <input id="eqty" value="${u.qty||''}" placeholder="الكمية"> <input id="ej" value="${u.j||''}" placeholder="الكود">
        <input id="ef1" value="${u.f1||''}" placeholder="كتف"> <input id="ef2" value="${u.f2||''}" placeholder="كم">
        <input id="ef3" value="${u.f3||''}" placeholder="صدر"> <input id="ef" value="${u.f||''}" placeholder="طول">
        <input id="ev1" type="number" value="${u.v1}" placeholder="العربون"> <input id="ev2" type="number" value="${u.v2}" placeholder="المتبقي">
        <textarea id="enote" style="grid-column:span 2" placeholder="ملاحظات">${u.note||''}</textarea>
    `;
    
    document.getElementById('btnUpdateFull').onclick = () => {
        u.n = document.getElementById('en').value; u.inv = document.getElementById('ei').value;
        u.p = document.getElementById('ep').value; u.id = document.getElementById('ed').value;
        u.qty = document.getElementById('eqty').value; u.j = document.getElementById('ej').value;
        u.f1 = document.getElementById('ef1').value; u.f2 = document.getElementById('ef2').value;
        u.f3 = document.getElementById('ef3').value; u.f = document.getElementById('ef').value;
        u.v1 = document.getElementById('ev1').value; u.v2 = document.getElementById('ev2').value;
        u.note = document.getElementById('enote').value;
        set(ref(db,'abonat'), window.d); alert("تم التحديث"); document.getElementById('detailsBox').style.display='none';
    };
    
    document.getElementById('btnDeleteFull').onclick = () => { if(confirm("حذف؟")){window.d.splice(i,1); set(ref(db,'abonat'), window.d); document.getElementById('detailsBox').style.display='none';}};
    
    document.getElementById('detailsBox').style.display='block';
};

document.getElementById('btnSave').onclick=()=>{
    let inv=document.getElementById('invNum').value, tel=document.getElementById('b').value, date=document.getElementById('id').value;
    if(!inv || !tel || !date) return alert("أكمل البيانات");
    let o={
        inv:inv, n:document.getElementById('a').value, p:tel, id:date,
        qty:document.getElementById('qty').value, j:document.getElementById('j').value,
        f1:document.getElementById('f1').value, f2:document.getElementById('f2').value,
        f3:document.getElementById('f3').value, f:document.getElementById('f').value,
        f_hole:document.getElementById('f_hole').value, v1:document.getElementById('g1').value,
        v2:document.getElementById('g2').value, loc:document.getElementById('locSelect').value,
        note:document.getElementById('k').value, by:window.currentUser,
        regDate: new Date().toLocaleString() // تاريخ التسجيل بدقة
    };
    window.d.push(o); set(ref(db,'abonat'), window.d); alert("تم الحفظ ✅");
};

// ريبورت مفصل بالتاريخ الكامل
window.generateReport = () => {
    let html = `<table border="1" style="width:100%; border-collapse:collapse; font-size:9px">
        <tr style="background:#eee"><th>التاريخ</th><th>الفاتورة</th><th>الاسم</th><th>المدفوع</th><th>المتبقي</th></tr>`;
    window.d.sort((a,b)=> new Date(b.id) - new Date(a.id)).forEach(u=>{
        html += `<tr><td>${u.id}</td><td>${u.inv}</td><td>${u.n}</td><td>${u.v1}</td><td>${u.v2}</td></tr>`;
    });
    html += `</table>`;
    document.getElementById('reportTitle').innerText = "التقرير المفصل للعمليات";
    document.getElementById('reportContent').innerHTML = html;
    document.getElementById('reportBox').style.display = 'block';
};

document.getElementById('btnExportWord').onclick = () => {
    let content = document.getElementById('reportContent').innerHTML;
    let blob = htmlDocx.asBlob(`<!DOCTYPE html><html dir="rtl"><body>${content}</body></html>`);
    let link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'Report.docx';
    link.click();
};

function updateCounter(){
    let tr=0; window.d.forEach(u=>tr+=parseFloat(u.v2)||0);
    document.getElementById('counter').innerText = `عدد الزبائن: ${window.d.length} | إجمالي المتبقي: ${tr.toFixed(2)}`;
}

document.getElementById('loginBtn').onclick=window.login;
document.getElementById('btnDebt').onclick=()=>{onlyDebt=!onlyDebt; r_table();};
document.getElementById('btnMonthly').onclick=window.generateReport;
document.getElementById('z').oninput=r_table;
</script>
</body>
</html>
