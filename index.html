<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abayat Al Omara</title>
<script src="https://cdn.jsdelivr.net/gh/evidenceprime/html-docx-js@master/dist/html-docx.js"></script>
<style>
body{font-family:tahoma;padding:10px;background:#fcfaf8;margin:0}
.box{max-width:550px;margin:auto;background:white;padding:15px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
#loginPage,#mainApp{display:none}
#loginPage{display:block;text-align:center;padding:40px 20px}
h2{text-align:center;color:#6b4f44;margin:5px 0; font-size: 18px;}
.status-text{text-align:center;font-size:10px;color:#2a9d8f;margin-bottom:10px;font-weight:bold}
input,button,textarea,select{width:100%;padding:10px;margin:5px 0;border:1px solid #eee;border-radius:10px;box-sizing:border-box;font-size:13px}
.req{border: 1px solid #ff000045 !important; background: #fff5f5;}
button{background:#6b4f44;color:white;border:none;font-weight:bold;cursor:pointer}
.row-grid {display: flex; gap: 5px; align-items: center;}
.row-grid > * {flex: 1;}
.size-section {background: #fdf6f2; padding: 10px; border-radius: 12px; margin: 10px 0; display: none; border: 1px solid #e9dcd3;}
.size-grid {display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;}
.size-grid input {padding: 8px; font-size: 11px; text-align: center; margin: 0;}
.counter-box{text-align:center;background:#fdf6f2;padding:8px;border-radius:10px;margin-bottom:10px;font-size:12px;color:#6b4f44;font-weight:bold;line-height:1.5}
.paid-highlight{color:#000;} .rem-highlight{color:#d62828;}
table{width:100%;margin-top:15px;border-collapse:collapse;font-size:10px}
th{background:#fdf6f2;color:#6b4f44;padding:8px}
td{border-bottom:1px solid #f9f9f9;padding:8px;text-align:center}
.blocked-row {background-color: #ff000021 !important; color: #d62828; font-weight: bold;} /* لون الصف المحظور */
.report-area{margin-top:20px;padding:10px;background:#fff;border:2px solid #3a5a40;border-radius:15px;display:none}
.switch{position:relative;display:inline-block;width:34px;height:18px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:20px}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:2px;bottom:2px;background-color:white;transition:.4s;border-radius:50%}
input:checked+.slider{background-color:#6b4f44}
input:checked+.slider:before{transform:translateX(16px)}
.selection-container{background:#f9f9f9;padding:8px;border-radius:10px;margin:5px 0;font-size:12px}
.selection-row{display:flex;justify-content:space-around;align-items:center;}
hr {border: 0; border-top: 1px solid #eee; margin: 10px 0;}
</style>
</head>
<body>

<div id="loginPage" class="box">
  <h2>🔐 دخول النظام</h2>
  <select id="userSelect">
    <option value="owner">صاحبة الحلال</option>
    <option value="naina">ناينا</option>
    <option value="other">أخرى</option>
    <option value="editor">Editor</option>
  </select>
  <input id="passInput" type="password" placeholder="الرقم السري">
  <button id="loginBtn">دخول</button>
</div>

<div id="mainApp" class="box">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
    <div style="font-size:12px">
        <label class="switch"><input type="checkbox" id="langToggle"><span class="slider"></span></label>
        <span>English</span>
    </div>
    <span id="userNameDisplay" style="font-weight:bold;color:#6b4f44; font-size:12px"></span>
    <button onclick="location.reload()" style="width:auto;padding:3px 10px;background:#eee;color:#333;font-size:10px">خروج</button>
  </div>
  
  <h2 id="mainTitle">عبايات الأمراء</h2>
  <div class="status-text" id="statusLine">⏳ جاري التحميل...</div>
  
  <div class="counter-box" id="counter"></div>

  <div class="row-grid">
    <input id="invNum" class="req" placeholder="رقم الفاتورة *">
    <input id="id" class="req" type="date" title="تاريخ الفاتورة">
  </div>

  <input id="a" placeholder="اسم الزبونة">
  <input id="b" class="req" placeholder="رقم التلفون *">

  <div class="row-grid">
    <input id="qty" placeholder="عدد العبايات">
    <input id="j" placeholder="رقم كود العباية">
  </div>

  <hr> <button type="button" onclick="toggleSizes()" style="background:#8d7166; font-size:11px; margin:5px 0;">📐 عرض / إخفاء المقاسات</button>
  <div id="sizeSection" class="size-section">
    <div class="size-grid">
        <input id="f1" placeholder="كتف">
        <input id="f2" placeholder="كم">
        <input id="f3" placeholder="صدر">
        <input id="f" placeholder="طول">
        <input id="f_hole" placeholder="حفرة">
        <input id="f_shirt" placeholder="قميص">
        <input id="f_skirt" placeholder="تنورة">
        <input id="f_waist" placeholder="خصر">
    </div>
  </div>

  <hr> <div class="row-grid">
    <input id="g1" class="req" placeholder="العربون *" type="number">
    <input id="g2" class="req" placeholder="المتبقي *" type="number">
    <input id="g3" placeholder="كامل" readonly style="background:#f1f1f1">
  </div>
  
  <div class="selection-container">
    <div class="selection-row">
      <label><input type="radio" name="loc" value="محل" checked> <span id="txtShop">محل</span></label>
      <label><input type="radio" name="loc" value="معرض"> <span id="txtExh">معرض</span></label>
      <label><input type="radio" name="loc" value="أونلاين"> <span id="txtOnline">أونلاين</span></label>
      |
      <label><input type="checkbox" id="checkOrder"> <span id="txtOrder">أوردر</span></label>
      <label><input type="checkbox" id="checkReady"> <span id="txtReady">جاهز</span></label>
    </div>
  </div>

  <textarea id="k" placeholder="ملاحظات" rows="1"></textarea>
  
  <div class="row-grid">
    <button id="btnSave" style="flex:2;">حفظ الطلب ✅</button>
    <button id="btnClear" style="background:#555;">🧹 تفريغ</button>
  </div>

  <button id="btnDebt" style="background:#d62828; margin-top:5px; padding:8px; font-size:11px;">💰 كشف المديونيات</button>

  <div id="adminPanel" style="display:none;margin-top:5px">
    <div class="row-grid">
      <button id="btnMonthly" style="background:#3a5a40; font-size:11px;">📊 شهري</button>
      <button id="btnYearly" style="background:#3a5a40; font-size:11px;">📅 سنوي</button>
      <button id="btnManageBlacklist" style="background:#000; font-size:11px;">🚫 المحظورين</button>
    </div>
  </div>

  <div id="blacklistModal" class="report-area" style="border-color: #000;">
    <h3 style="text-align:center; font-size:14px;">🚫 المحظورين</h3>
    <div class="row-grid">
        <input id="newBlackNum" placeholder="الرقم">
        <button id="addBlackBtn" style="width: auto; background: #d62828;">حظر</button>
    </div>
    <div id="blacklistItems" style="margin-top:10px; max-height: 150px; overflow-y: auto;"></div>
    <button onclick="document.getElementById('blacklistModal').style.display='none'" style="background:#444; margin-top:5px">إغلاق</button>
  </div>

  <div id="reportBox" class="report-area">
    <h3 id="reportTitle" style="text-align:center;color:#3a5a40; font-size:14px;"></h3>
    <div id="reportContent" style="overflow-x: auto;"></div>
    <button id="btnExportWord" style="background:#2b5797; font-size:11px;">تحميل Word 📄</button>
    <button onclick="document.getElementById('reportBox').style.display='none'" style="background:#444;">إغلاق</button>
  </div>

  <input id="z" placeholder="🔍 بحث سريع..." style="margin-top:15px">
  
  <table id="mainTable">
    <thead>
        <tr>
            <th>فاتورة</th>
            <th>الاسم</th>
            <th>المكان</th>
            <th>بواسطة</th>
            <th>المتبقي</th>
            <th>عرض</th>
        </tr>
    </thead>
    <tbody id="t"></tbody>
  </table>

  <div id="detailsBox" style="display:none;border:2px solid #6b4f44;padding:10px;border-radius:15px;margin-top:10px;background:#fff">
    <div id="detInfo"></div>
    <div id="editArea"></div>
    <button onclick="document.getElementById('detailsBox').style.display='none'" style="background:gray;">إغلاق</button>
  </div>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {getDatabase,ref,set,onValue} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDCSx-_o07zM_pqCeIFCdon25k7jQzZMJo",
  authDomain: "alomara-b5b95.firebaseapp.com",
  databaseURL: "https://alomara-b5b95-default-rtdb.firebaseio.com",
  projectId: "alomara-b5b95",
  storageBucket: "alomara-b5b95.firebasestorage.app",
  messagingSenderId: "208627786275",
  appId: "1:208627786275:web:3bd56f7eb2e964773b8796",
  measurementId: "G-2FTVWW4D5B"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.d = [];
window.blacklist = [];
window.role = "";
window.currentUser = "";
window.ownerPass = "4400";
window.nainaPass = "1234";
window.otherPass = "1357";
window.editorPass = "98988";

let currentLang = 'ar';
let onlyDebt = false;

// وظيفة عرض وإخفاء المقاسات
window.toggleSizes = () => {
    let s = document.getElementById('sizeSection');
    s.style.display = (s.style.display === 'block') ? 'none' : 'block';
};

onValue(ref(db,'abonat'),(s)=>{
    window.d = s.exists() ? s.val() : [];
    document.getElementById('statusLine').innerHTML = "✅ متصل - الحفظ تلقائي ☁️";
    r_table(); updateCounter();
});

onValue(ref(db,'blacklist'),(s)=>{
    window.blacklist = s.exists() ? s.val() : [];
    renderBlacklist();
    r_table(); // تحديث الجدول لتلوين المحظورين
});

const T = {
  ar: {
    hello: "مرحباً: ", shop: "محل", exh: "معرض", online: "أونلاين", order: "أوردر", ready: "جاهز", customers: "زبائن", totalPaid: "المدفوع", totalRem: "المتبقي", btnDebt: "💰 كشف المديونيات", btnAll: "👥 عرض الجميع"
  },
  en: {
    hello: "Hi: ", shop: "Shop", exh: "Maarad", online: "Online", order: "Order", ready: "Ready", customers: "Cust", totalPaid: "Paid", totalRem: "Rem", btnDebt: "💰 Debt Only", btnAll: "👥 Show All"
  }
};

window.login=()=>{
    let u=document.getElementById('userSelect').value, p=document.getElementById('passInput').value;
    let ok=false, name="";
    if(u==='owner' && p==window.ownerPass){ok=true;name="صاحبة الحلال";}
    else if(u==='naina' && p==window.nainaPass){ok=true;name="ناينا";}
    else if(u==='other' && p==window.otherPass){ok=true;name="موظف آخر";}
    else if(u==='editor' && p==window.editorPass){ok=true;name="Editor";}
    
    if(ok){
        window.role=u; window.currentUser=name;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainApp').style.display='block';
        if(u==='owner'||u==='editor') document.getElementById('adminPanel').style.display='block';
        document.getElementById('userNameDisplay').textContent=T[currentLang].hello + name;
    } else alert('الرمز خطأ!');
};

function r_table(){
    let term=document.getElementById('z').value.toLowerCase();
    let fd=window.d.filter(u=> (u.n && u.n.toLowerCase().includes(term)) || (u.p && u.p.includes(term)) || (u.inv && u.inv.includes(term)));
    if(onlyDebt) fd=fd.filter(u=>(parseFloat(u.v2)||0)>0);
    
    let h='';
    let t = T[currentLang];
    fd.forEach(u=>{
        let i=window.d.indexOf(u);
        let isBlocked = window.blacklist.includes(u.p);
        let rowClass = isBlocked ? 'blocked-row' : '';
        
        let locMap = { 'محل': t.shop, 'معرض': t.exh, 'أونلاين': t.online };
        let displayLoc = (locMap[u.loc] || u.loc) + (u.isOrder?"+أ":"") + (u.isReady?"+ج":"");
        
        h+=`<tr class="${rowClass}">
                <td>${u.inv||'--'}</td>
                <td>${u.n}</td>
                <td>${displayLoc}</td>
                <td>${u.by || '--'}</td>
                <td style="color:red;font-weight:bold">${u.v2}</td>
                <td><button onclick="showDet(${i})" style="padding:2px 5px; font-size:9px;">👁️</button></td>
            </tr>`;
    });
    document.getElementById('t').innerHTML=h;
}

window.showDet=(i)=>{
    let u=window.d[i];
    document.getElementById('detInfo').innerHTML=`
        <div style="font-size:12px; line-height:1.4">
        <b>👤 ${u.n}</b> | 🧾 ${u.inv||'--'} | 📅 ${u.id||'--'}<br>
        📏 كتف:${u.f1} كم:${u.f2} صدر:${u.f3} طول:${u.f} حفرة:${u.f_hole||'-'}<br>
        👕 قميص:${u.f_shirt||'-'} تنورة:${u.f_skirt||'-'} خصر:${u.f_waist||'-'}
        </div><hr>`;
    
    if(window.role==='owner' || window.role==='editor') {
        document.getElementById('editArea').innerHTML=`
            <div class="size-grid">
                <input id="en" value="${u.n}" placeholder="الاسم">
                <input id="ei" value="${u.inv||''}" placeholder="الفاتورة">
                <input id="ep" value="${u.p||''}" placeholder="التلفون">
                <input id="ev1" type="number" value="${u.v1}" placeholder="عربون">
                <input id="ev2" type="number" value="${u.v2}" placeholder="متبقي">
                <button onclick="fullEdit(${i})" style="grid-column: span 2; background:#2a9d8f; font-size:10px;">تحديث ✅</button>
                <button onclick="q(${i})" style="grid-column: span 1; background:red; font-size:10px;">حذف 🗑️</button>
            </div>`;
    }
    document.getElementById('detailsBox').style.display='block';
};

window.fullEdit=(i)=>{
    window.d[i].n = document.getElementById('en').value;
    window.d[i].inv = document.getElementById('ei').value;
    window.d[i].p = document.getElementById('ep').value;
    window.d[i].v1 = document.getElementById('ev1').value;
    window.d[i].v2 = document.getElementById('ev2').value;
    window.d[i].v3 = (parseFloat(window.d[i].v1) + parseFloat(window.d[i].v2)).toFixed(2);
    set(ref(db,'abonat'), window.d);
    alert("تم التحديث");
    document.getElementById('detailsBox').style.display='none';
};

window.q=(i)=>{ if(confirm("حذف؟")){window.d.splice(i,1); set(ref(db,'abonat'), window.d); document.getElementById('detailsBox').style.display='none';}};

window.generateDetailedReport = (type) => {
    let now = new Date();
    let m = now.getMonth() + 1;
    let y = now.getFullYear();
    let filtered = window.d.filter(u => type === 'monthly' ? (u.month == m && u.year == y) : (u.year == y));
    let title = type === 'monthly' ? `شهري ${m}-${y}` : `سنوي ${y}`;
    document.getElementById('reportTitle').innerText = title;
    let h = `<table id="reportTableExport" border="1" style="width:100%; font-size:10px; border-collapse:collapse;">
                <tr style="background:#eee;"><th>التاريخ</th><th>الفاتورة</th><th>الزبونة</th><th>المدفوع</th><th>المتبقي</th><th>بواسطة</th></tr>`;
    let s1=0, s2=0;
    filtered.forEach(u => {
        h += `<tr><td>${u.id} ${u.time||''}</td><td>${u.inv}</td><td>${u.n}</td><td>${u.v1}</td><td>${u.v2}</td><td>${u.by}</td></tr>`;
        s1 += parseFloat(u.v1)||0; s2 += parseFloat(u.v2)||0;
    });
    h += `<tr style="font-weight:bold; background:#f9f9f9;"><td colspan="3">الإجمالي</td><td>${s1.toFixed(2)}</td><td>${s2.toFixed(2)}</td><td></td></tr></table>`;
    document.getElementById('reportContent').innerHTML = h;
    document.getElementById('reportBox').style.display = 'block';
};

document.getElementById('btnExportWord').onclick = () => {
    let content = document.getElementById('reportContent').innerHTML;
    let title = document.getElementById('reportTitle').innerText;
    let html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"></head><body><h2>${title}</h2>${content}</body></html>`;
    let converted = htmlDocx.asBlob(html);
    let link = document.createElement('a');
    link.href = URL.createObjectURL(converted);
    link.download = `${title}.docx`;
    link.click();
};

function updateCounter(){
    let tr=0, tp=0; window.d.forEach(u=>{tr+=parseFloat(u.v2)||0; tp+=parseFloat(u.v1)||0;});
    let t = T[currentLang];
    document.getElementById('counter').innerHTML = `#${window.d.length} ${t.customers} | <span class="paid-highlight">${t.totalPaid}: ${tp.toFixed(2)}</span> | <span class="rem-highlight">${t.totalRem}: ${tr.toFixed(2)}</span>`;
}

document.getElementById('loginBtn').onclick=window.login;
document.getElementById('g1').oninput = document.getElementById('g2').oninput = () => {
    let v1=parseFloat(document.getElementById('g1').value)||0, v2=parseFloat(document.getElementById('g2').value)||0;
    document.getElementById('g3').value=(v1+v2).toFixed(2);
};

document.getElementById('btnSave').onclick=()=>{
    let inv=document.getElementById('invNum').value, tel=document.getElementById('b').value, date=document.getElementById('id').value, v1=document.getElementById('g1').value, v2=document.getElementById('g2').value;
    if(!inv || !tel || !date || !v1 || !v2) return alert("تعبئة الخانات المطلوبة *");
    
    let now = new Date();
    let timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');

    let o={
        inv:inv, n:document.getElementById('a').value, p:tel, qty:document.getElementById('qty').value, j:document.getElementById('j').value, 
        f1:document.getElementById('f1').value, f2:document.getElementById('f2').value, f3:document.getElementById('f3').value, f:document.getElementById('f').value, 
        f_hole:document.getElementById('f_hole').value, f_shirt:document.getElementById('f_shirt').value, f_skirt:document.getElementById('f_skirt').value, f_waist:document.getElementById('f_waist').value,
        v1:v1, v2:v2, v3:document.getElementById('g3').value, loc:document.querySelector('input[name="loc"]:checked').value,
        isOrder: document.getElementById('checkOrder').checked, isReady: document.getElementById('checkReady').checked,
        note:document.getElementById('k').value, id:date, time:timeStr, by:window.currentUser, month:now.getMonth()+1, year:now.getFullYear()
    };
    window.d.push(o); set(ref(db,'abonat'), window.d);
    alert("✅ تم الحفظ");
    document.getElementById('btnClear').click();
};

document.getElementById('btnClear').onclick=()=>{
    ['invNum','a','b','qty','j','f1','f2','f3','f','f_hole','f_shirt','f_skirt','f_waist','g1','g2','g3','k','id'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('checkOrder').checked = document.getElementById('checkReady').checked = false;
};

function renderBlacklist() {
    let h = '';
    window.blacklist.forEach((num, index) => {
        h += `<div style="display:flex; justify-content:space-between; align-items:center; background:#eee; padding:5px; margin-bottom:2px; font-size:11px;">
                <span>📱 ${num}</span>
                <button onclick="removeFromBlacklist(${index})" style="padding:2px 5px; background:red;">حذف</button>
              </div>`;
    });
    document.getElementById('blacklistItems').innerHTML = h || 'لا يوجد';
}

document.getElementById('addBlackBtn').onclick = () => {
    let num = document.getElementById('newBlackNum').value.trim();
    if(num && !window.blacklist.includes(num)) {
        window.blacklist.push(num);
        set(ref(db, 'blacklist'), window.blacklist);
        document.getElementById('newBlackNum').value = '';
    }
};

window.removeFromBlacklist = (index) => {
    if(confirm("إزالة؟")) {
        window.blacklist.splice(index, 1);
        set(ref(db, 'blacklist'), window.blacklist);
    }
};

document.getElementById('btnManageBlacklist').onclick = () => document.getElementById('blacklistModal').style.display='block';
document.getElementById('btnMonthly').onclick = () => window.generateDetailedReport('monthly');
document.getElementById('btnYearly').onclick = () => window.generateDetailedReport('yearly');
document.getElementById('btnDebt').onclick = () => { onlyDebt = !onlyDebt; document.getElementById('btnDebt').innerText = onlyDebt ? T[currentLang].btnAll : T[currentLang].btnDebt; r_table(); };
document.getElementById('z').oninput = r_table;
</script>
</body>
</html>
