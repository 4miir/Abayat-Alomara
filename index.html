<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abayat Al Omara</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-docx-js/0.3.1/html-docx.js"></script>
<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {getDatabase,ref,set,onValue} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDCSx-_o07zM_pqCeIFCdon25k7jQzZMJo",
  authDomain: "alomara-b5b95.firebaseapp.com",
  databaseURL: "https://alomara-b5b95-default-rtdb.firebaseio.com",
  projectId: "alomara-b5b95",
  storageBucket: "alomara-b5b95.firebasestorage.app",
  messagingSenderId: "208627786275",
  appId: "1:208627786275:web:3bd56f7eb2e964773b8796",
  measurementId: "G-2FTVWW4D5B"
};

let db;
window.ownerPass = "4400";
window.nainaPass = "1234";
window.otherPass = "1357";
window.editorPass = "98988";
window.isDataLoaded = false;

try{
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    onValue(ref(db,'abonat'),(s)=>{
        window.d = s.exists() ? s.val() : [];
        window.isDataLoaded = true;
        document.getElementById('statusLine').innerHTML = "✅ متصل - الحفظ تلقائي ☁️";
        r_table();
        updateCounter();
    }, (error) => {
        document.getElementById('statusLine').innerHTML = "❌ خطأ في الاتصال!";
    });
}catch(e){ console.error("Firebase Error", e); }

window.syncToCloud=()=>{
    if(db && window.isDataLoaded){
        set(ref(db,'abonat'), window.d);
    }
};
</script>
<style>
body{font-family:tahoma;padding:15px;background:#fcfaf8;margin:0}
.box{max-width:550px;margin:auto;background:white;padding:20px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
#loginPage,#mainApp{display:none}
#loginPage{display:block;text-align:center;padding:40px 20px}
h2{text-align:center;color:#6b4f44;margin:5px 0}
.status-text{text-align:center;font-size:11px;color:#2a9d8f;margin-bottom:15px;font-weight:bold}
input,button,textarea,select{width:100%;padding:14px;margin:8px 0;border:1px solid #eee;border-radius:12px;box-sizing:border-box;font-size:14px}
button{background:#6b4f44;color:white;border:none;font-weight:bold;cursor:pointer}
.counter-box{text-align:center;background:#fdf6f2;padding:12px;border-radius:12px;margin-bottom:15px;font-size:13px;color:#6b4f44;font-weight:bold;line-height:2}
.line-separator{border-top:1px solid #ddd;margin:8px 0}
.paid-highlight{color:#000;font-size:15px;display:block}
.rem-highlight{color:#d62828;font-size:15px;display:block}
table{width:100%;margin-top:20px;border-collapse:collapse;font-size:11px}
th{background:#fdf6f2;color:#6b4f44;padding:8px}
td{border-bottom:1px solid #f9f9f9;padding:8px;text-align:center}
.report-area{margin-top:20px;padding:10px;background:#fff;border:2px solid #3a5a40;border-radius:15px;display:none}
.lang-container{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:15px}
.switch{position:relative;display:inline-block;width:40px;height:22px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:20px}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%}
input:checked+.slider{background-color:#6b4f44}
input:checked+.slider:before{transform:translateX(18px)}
</style>
</head>
<body>

<div id="loginPage" class="box">
  <h2>🔐 دخول النظام</h2>
  <select id="userSelect">
    <option value="owner">صاحبة الحلال</option>
    <option value="naina">ناينا</option>
    <option value="other">أخرى</option>
    <option value="editor">Editor</option>
  </select>
  <input id="passInput" type="password" placeholder="الرقم السري">
  <button onclick="login()">دخول</button>
</div>

<div id="mainApp" class="box">
  <div class="lang-container">
    <span>عربي</span>
    <label class="switch"><input type="checkbox" id="langToggle" onchange="toggleLang()"><span class="slider"></span></label>
    <span>English</span>
  </div>
  <h2 id="mainTitle">عبايات الأمراء - الزبائن</h2>
  <div class="status-text" id="statusLine">⏳ جاري التحميل...</div>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span id="userNameDisplay" style="font-weight:bold;color:#6b4f44"></span>
    <button id="btnLogout" onclick="location.reload()" style="width:auto;padding:5px 15px;background:#f0f0f0;color:#333;font-size:11px">خروج</button>
  </div>
  <hr>
  <div class="counter-box" id="counter"></div>

  <input id="invNum" placeholder="رقم الفاتورة">
  <label id="labelDate" style="font-size:12px;color:gray;display:block;text-align:right">تاريخ الفاتورة</label>
  <input id="id" type="date">
  <input id="a" placeholder="اسم الزبونة">
  <input id="b" placeholder="رقم التلفون">
  <input id="qty" placeholder="عدد العبايات">
  <input id="j" placeholder="رقم كود العباية">
  <input id="f1" placeholder="الكتف">
  <input id="f2" placeholder="الكم">
  <input id="f3" placeholder="الصدر">
  <input id="f" placeholder="الطول">
  <div style="display:flex;gap:10px">
    <input id="g1" placeholder="العربون" type="number" oninput="calc()">
    <input id="g2" placeholder="المتبقي" type="number" oninput="calc()">
  </div>
  <input id="g3" placeholder="السعر الكامل" readonly style="background:#f9f9f9">
  <textarea id="k" placeholder="ملاحظات" rows="2"></textarea>
  <button id="btnSave" onclick="s()" style="background:#8b6d5c">حفظ الطلب ✅</button>

  <div style="margin-top:10px">
    <button id="btnDebt" style="background:#d62828;" onclick="report('remaining')">💰 كشف المتبقي (المديونيات)</button>
  </div>

  <div id="adminPanel" style="display:none;margin-top:5px">
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      <button id="btnMonthly" style="background:#3a5a40;flex:1;min-width:140px;" onclick="generateDetailedReport('monthly')">📊 ريبورت شهري</button>
      <button id="btnYearly" style="background:#3a5a40;flex:1;min-width:140px;" onclick="generateDetailedReport('yearly')">📅 ريبورت سنوي</button>
    </div>
  </div>

  <div id="reportBox" class="report-area">
    <h3 id="reportTitle" style="text-align:center;color:#3a5a40;margin-top:0"></h3>
    <div id="reportContent"></div>
    <button onclick="document.getElementById('reportBox').style.display='none'" style="background:#444;margin-top:10px">إغلاق التقرير</button>
  </div>

  <input id="z" placeholder="🔍 ابحث هنا عن اسم أو رقم..." oninput="r_table()" style="margin-top:20px">
  <div id="filterInfo" style="display:none;text-align:center;font-size:12px;padding:5px;color:red;font-weight:bold;">⚠️ عرض المديونيات فقط</div>
  
  <table>
    <thead><tr><th id="thInv">الفاتورة</th><th id="thName">الاسم</th><th id="thRem">المتبقي</th><th id="thView">عرض</th></tr></thead>
    <tbody id="t"></tbody>
  </table>

  <div id="detailsBox" style="display:none;border:2px solid #6b4f44;padding:15px;border-radius:15px;margin-top:15px;background:#fff">
    <div id="detInfo"></div>
    <div id="editArea" style="background:#f9f9f9;padding:10px;border-radius:12px;margin-top:10px;border:1px dashed #6b4f44"></div>
    <button id="btnClose" onclick="document.getElementById('detailsBox').style.display='none'" style="background:gray;margin-top:10px">إغلاق</button>
  </div>
</div>

<script>
window.d = [];
let onlyDebt = false;
let currentLang = 'ar';

const T = {
  ar: {
    mainTitle: "عبايات الأمراء - الزبائن",
    logout: "خروج",
    dateLabel: "تاريخ الفاتورة",
    invNum: "رقم الفاتورة",
    a: "اسم الزبونة", b: "رقم التلفون", qty: "عدد العبايات",
    j: "رقم كود العباية", f1: "الكتف", f2: "الكم",
    f3: "الصدر", f: "الطول", g1: "العربون", g2: "المتبقي",
    g3: "السعر الكامل", k: "ملاحظات",
    btnSave: "حفظ الطلب ✅",
    btnDebt: "💰 كشف المتبقي (المديونيات)",
    btnMonthly: "📊 ريبورت شهري",
    btnYearly: "📅 ريبورت سنوي",
    search: "🔍 ابحث هنا عن اسم أو رقم...",
    filterInfo: "⚠️ عرض المديونيات فقط",
    thName: "الاسم", thRem: "المتبقي", thView: "عرض", thInv: "الفاتورة",
    hello: "مرحباً: ", close: "إغلاق", dir: "rtl",
    paid: "إجمالي المدفوع", rem: "إجمالي المتبقي",
    btnWord: "📄 تحميل ملف Word"
  },
  en: {
    mainTitle: "Abayat Al Omara - Customers",
    logout: "Logout",
    dateLabel: "Invoice Date",
    invNum: "Invoice Number",
    a: "Customer Name", b: "Phone Number", qty: "Qty",
    j: "Abaya Code", f1: "Shoulder", f2: "Sleeve",
    f3: "Chest", f: "Height", g1: "Deposit", g2: "Remaining",
    g3: "Total Price", k: "Notes",
    btnSave: "Save Order ✅",
    btnDebt: "💰 Debt Report",
    btnMonthly: "📊 Monthly Report",
    btnYearly: "📅 Yearly Report",
    search: "🔍 Search name or number...",
    filterInfo: "⚠️ Showing debts only",
    thName: "Name", thRem: "Rem.", thView: "View", thInv: "Inv #",
    hello: "Welcome: ", close: "Close", dir: "ltr",
    paid: "Total Paid", rem: "Total Remaining",
    btnWord: "📄 Download Word"
  }
};

function toggleLang() {
  currentLang = document.getElementById('langToggle').checked ? 'en' : 'ar';
  applyLang();
}

function applyLang() {
  let t = T[currentLang];
  document.getElementById('mainApp').setAttribute('dir', t.dir);
  document.getElementById('mainTitle').textContent = t.mainTitle;
  document.getElementById('btnLogout').textContent = t.logout;
  document.getElementById('labelDate').textContent = t.dateLabel;
  document.getElementById('invNum').placeholder = t.invNum;
  document.getElementById('a').placeholder = t.a;
  document.getElementById('b').placeholder = t.b;
  document.getElementById('qty').placeholder = t.qty;
  document.getElementById('j').placeholder = t.j;
  document.getElementById('f1').placeholder = t.f1;
  document.getElementById('f2').placeholder = t.f2;
  document.getElementById('f3').placeholder = t.f3;
  document.getElementById('f').placeholder = t.f;
  document.getElementById('g1').placeholder = t.g1;
  document.getElementById('g2').placeholder = t.g2;
  document.getElementById('g3').placeholder = t.g3;
  document.getElementById('k').placeholder = t.k;
  document.getElementById('btnSave').textContent = t.btnSave;
  document.getElementById('btnDebt').textContent = t.btnDebt;
  document.getElementById('btnMonthly').textContent = t.btnMonthly;
  document.getElementById('btnYearly').textContent = t.btnYearly;
  document.getElementById('z').placeholder = t.search;
  document.getElementById('filterInfo').textContent = t.filterInfo;
  document.getElementById('thName').textContent = t.thName;
  document.getElementById('thRem').textContent = t.thRem;
  document.getElementById('thView').textContent = t.thView;
  document.getElementById('thInv').textContent = t.thInv;
  document.getElementById('btnClose').textContent = t.close;
  if(window.currentUser) document.getElementById('userNameDisplay').textContent = t.hello + window.currentUser;
  updateCounter(); r_table();
}

function login() {
  let u = document.getElementById('userSelect').value;
  let p = document.getElementById('passInput').value;
  let ok = false; let name = "";
  if(u==='owner' && p==window.ownerPass){ok=true;name="صاحبة الحلال";}
  else if(u==='naina' && p==window.nainaPass){ok=true;name="ناينا";}
  else if(u==='other' && p==window.otherPass){ok=true;name="موظف آخر";}
  else if(u==='editor' && p==window.editorPass){ok=true;name="Editor";}
  if(ok){
    window.role=u; window.currentUser=name;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainApp').style.display='block'; applyLang();
    if(u==='owner'||u==='editor') document.getElementById('adminPanel').style.display='block';
    updateCounter(); r_table();
  } else alert(currentLang==='ar'?'خطأ بالرمز!':'Wrong Password!');
}

function calc(){
  let v1=parseFloat(document.getElementById('g1').value)||0;
  let v2=parseFloat(document.getElementById('g2').value)||0;
  document.getElementById('g3').value=(v1+v2).toFixed(2);
}

function s(){
  if(!window.isDataLoaded) return alert("انتظر تحميل البيانات...");
  let name=document.getElementById('a').value; if(!name) return alert("الاسم مطلوب");
  let today = new Date();
  let o={
    sn:window.d.length+1,
    inv:document.getElementById('invNum').value,
    n:name,
    p:document.getElementById('b').value,
    qty:document.getElementById('qty').value,
    j:document.getElementById('j').value,
    f1:document.getElementById('f1').value,
    f2:document.getElementById('f2').value,
    f3:document.getElementById('f3').value,
    f:document.getElementById('f').value,
    v1:document.getElementById('g1').value,
    v2:document.getElementById('g2').value,
    v3:document.getElementById('g3').value,
    note:document.getElementById('k').value,
    id:document.getElementById('id').value,
    by:window.currentUser,
    month:today.getMonth()+1,
    year:today.getFullYear()
  };
  window.d.push(o);
  window.syncToCloud();
  ['invNum','a','b','qty','j','f1','f2','f3','f','g1','g2','g3','k','id'].forEach(i=>document.getElementById(i).value='');
  updateCounter(); r_table();
}

function r_table(){
  let h=''; let term=document.getElementById('z').value;
  let fd=window.d.filter(u=>(u.n&&u.n.includes(term))||(u.p&&u.p.includes(term))||(u.inv&&u.inv.includes(term)));
  if(onlyDebt){fd=fd.filter(u=>(parseFloat(u.v2)||0)>0);document.getElementById('filterInfo').style.display='block';}
  else{document.getElementById('filterInfo').style.display='none';}
  fd.forEach(u=>{
    let idx=window.d.indexOf(u);
    h+=`<tr><td>${u.inv||'--'}</td><td>${u.n}</td><td style="color:red;font-weight:bold">${u.v2}</td><td><button style="padding:4px; border-radius:8px;" onclick="showDet(${idx})">${T[currentLang].thView}</button></td></tr>`;
  });
  document.getElementById('t').innerHTML=h;
}

// وظيفة إنشاء التقرير التفصيلي مع خيار تحميل Word
function generateDetailedReport(type) {
    let now = new Date();
    let cM = now.getMonth() + 1;
    let cY = now.getFullYear();
    let filtered = window.d.filter(u => type === 'monthly' ? (u.month === cM && u.year === cY) : u.year === cY);
    
    if(filtered.length === 0) {
        alert(currentLang === 'ar' ? "لا توجد بيانات لهذه الفترة" : "No data for this period");
        return;
    }

    let totalSales = 0, totalPaid = 0, totalRem = 0;
    let reportTitle = (type === 'monthly' ? "تقرير شهر " + cM : "تقرير سنة " + cY);
    
    let tableHtml = `
        <div id="wordExportContent" dir="rtl" style="font-family: Arial, sans-serif; padding: 10px;">
            <h2 style="text-align:center; color:#3a5a40;">${reportTitle}</h2>
            <table border="1" style="width:100%; border-collapse:collapse; font-size:12px; text-align:center;">
                <thead>
                    <tr style="background:#fdf6f2;">
                        <th style="padding:5px;">الفاتورة</th>
                        <th style="padding:5px;">الاسم</th>
                        <th style="padding:5px;">العربون</th>
                        <th style="padding:5px;">المتبقي</th>
                        <th style="padding:5px;">الإجمالي</th>
                    </tr>
                </thead>
                <tbody>`;
    
    filtered.forEach(u => {
        let v1 = parseFloat(u.v1) || 0;
        let v2 = parseFloat(u.v2) || 0;
        let v3 = parseFloat(u.v3) || 0;
        totalSales += v3; totalPaid += v1; totalRem += v2;
        tableHtml += `<tr>
            <td style="padding:5px;">${u.inv || '-'}</td>
            <td style="padding:5px;">${u.n}</td>
            <td style="padding:5px;">${v1}</td>
            <td style="padding:5px; color:red;">${v2}</td>
            <td style="padding:5px;">${v3}</td>
        </tr>`;
    });

    tableHtml += `</tbody></table>
        <div style="margin-top:15px; font-weight:bold; font-size:14px; text-align:right; border-top:2px solid #3a5a40; padding-top:10px;">
            <p>إجمالي المبيعات: ${totalSales.toFixed(2)} د.ك</p>
            <p>إجمالي المحصل: ${totalPaid.toFixed(2)} د.ك</p>
            <p style="color:red">إجمالي المديونيات: ${totalRem.toFixed(2)} د.ك</p>
        </div>
    </div>`;

    let wordBtn = `<button onclick="exportReportToWord('${reportTitle}')" style="background:#2b2d42; margin-bottom:10px;">${T[currentLang].btnWord}</button>`;

    document.getElementById('reportTitle').innerText = reportTitle;
    document.getElementById('reportContent').innerHTML = wordBtn + tableHtml;
    document.getElementById('reportBox').style.display = 'block';
    window.scrollTo(0, document.getElementById('reportBox').offsetTop);
}

// وظيفة تصدير الملف
function exportReportToWord(filename) {
    let content = document.getElementById('wordExportContent').innerHTML;
    let header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' "+
            "xmlns:w='urn:schemas-microsoft-com:office:word' "+
            "xmlns='http://www.w3.org/TR/REC-html40'>"+
            "<head><meta charset='utf-8'><title>Report</title></head><body>";
    let footer = "</body></html>";
    let sourceHTML = header + content + footer;
    
    let source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
    let fileDownload = document.createElement("a");
    document.body.appendChild(fileDownload);
    fileDownload.href = source;
    fileDownload.download = filename + '.doc';
    fileDownload.click();
    document.body.removeChild(fileDownload);
}

function showDet(i){
  let u=window.d[i];
  document.getElementById('detInfo').innerHTML=`<h4>${u.n}</h4><p>رقم الفاتورة: ${u.inv||'--'}</p><p>القياسات: ${u.f1} - ${u.f2} - ${u.f3} - ${u.f}</p><p>${u.note||''}</p>`;
  let e=`<input id="newName" value="${u.n}"><input id="newRem" type="number" value="${u.v2}"><button onclick="saveEdit(${i})" style="background:#2a9d8f">حفظ التغييرات</button>`;
  if(window.role==='owner'||window.role==='editor') e+=`<button onclick="q(${i})" style="background:red;margin-top:5px">حذف الطلب</button>`;
  document.getElementById('editArea').innerHTML=e;
  document.getElementById('detailsBox').style.display='block';
}

function saveEdit(i){
  window.d[i].n=document.getElementById('newName').value;
  window.d[i].v2=document.getElementById('newRem').value;
  window.syncToCloud(); r_table(); updateCounter();
  document.getElementById('detailsBox').style.display='none';
}

function q(i){if(confirm("حذف؟")){window.d.splice(i,1);window.syncToCloud();r_table();updateCounter();document.getElementById('detailsBox').style.display='none';}}

function updateCounter(){
  let tr=0,tp=0;
  window.d.forEach(u=>{tr+=parseFloat(u.v2)||0;tp+=parseFloat(u.v1)||0;});
  let t = T[currentLang];
  document.getElementById('counter').innerHTML=`
    #${window.d.length+1} | زبائننا: ${window.d.length}
    <div class="line-separator"></div>
    <span class="paid-highlight">${t.paid}: ${tp.toFixed(2)} KD</span>
    <span class="rem-highlight">${t.rem}: ${tr.toFixed(2)} KD</span>
  `;
}

function report(type){
  if(type==='remaining'){
    onlyDebt=!onlyDebt; r_table();
  }
}
</script>
</body>
</html>
