<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Abayat Al Omara</title>
<script src="https://cdn.jsdelivr.net/gh/evidenceprime/html-docx-js@master/dist/html-docx.js"></script>
<style>
body{font-family:tahoma;padding:10px;background:#fcfaf8;margin:0; -webkit-tap-highlight-color: transparent;}
.box{max-width:550px;margin:auto;background:white;padding:15px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
#loginPage,#mainApp{display:none}
#loginPage{display:block;text-align:center;padding:40px 20px}
h2{text-align:center;color:#6b4f44;margin:5px 0; font-size: 18px;}
.status-text{text-align:center;font-size:10px;color:#2a9d8f;margin-bottom:10px;font-weight:bold}
input,button,textarea,select{width:100%;padding:10px;margin:5px 0;border:1px solid #eee;border-radius:10px;box-sizing:border-box;font-size:13px; -webkit-appearance: none;}
.req{border: 1px solid #ff000045 !important; background: #fff5f5;}
button{background:#6b4f44;color:white;border:none;font-weight:bold;cursor:pointer; touch-action: manipulation;}
.row-grid {display: flex; gap: 5px; align-items: center;}
.row-grid > * {flex: 1;}
.size-section {background: #fdf6f2; padding: 10px; border-radius: 12px; margin: 10px 0; display: none; border: 1px solid #e9dcd3;}
.size-grid {display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;}
.size-grid input {padding: 8px; font-size: 11px; text-align: center; margin: 0;}
.counter-box{text-align:center;background:#fdf6f2;padding:8px;border-radius:10px;margin-bottom:10px;font-size:12px;color:#6b4f44;font-weight:bold;line-height:1.5}
table{width:100%;margin-top:15px;border-collapse:collapse;font-size:10px}
th{background:#fdf6f2;color:#6b4f44;padding:8px}
td{border-bottom:1px solid #f9f9f9;padding:8px;text-align:center}
.blocked-row {background-color: #ff000021 !important; color: #d62828; font-weight: bold;}
.report-area{margin-top:20px;padding:10px;background:#fff;border:2px solid #3a5a40;border-radius:15px;display:none}
.switch{position:relative;display:inline-block;width:34px;height:18px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:20px}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:2px;bottom:2px;background-color:white;transition:.4s;border-radius:50%}
input:checked+.slider{background-color:#6b4f44}
input:checked+.slider:before{transform:translateX(16px)}
.selection-container{background:#f9f9f9;padding:8px;border-radius:10px;margin:5px 0;font-size:12px}
.selection-row{display:flex;justify-content:space-around;align-items:center;}
hr {border: 0; border-top: 1px solid #eee; margin: 10px 0;}

/* Modal Style - محسن للايفون */
#viewModal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; overflow-y: auto;}
.modal-content {background:white; max-width:90%; width:380px; margin:40px auto; padding:20px; border-radius:15px; position:relative; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
.modal-detail {margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; display: flex; justify-content: space-between;}
.modal-detail b {color: #6b4f44;}
</style>
</head>
<body>

<div id="loginPage" class="box">
  <h2 id="loginTitle">🔐 دخول النظام</h2>
  <select id="userSelect">
    <option value="owner">Amir</option>
    <option value="naina">ناينا</option>
    <option value="other">أخرى</option>
    <option value="editor">Editor</option>
  </select>
  <input id="passInput" type="password" placeholder="الرقم السري">
  <button id="loginBtn" onclick="window.login()">دخول</button>
</div>

<div id="viewModal">
    <div class="modal-content">
        <h3 style="text-align:center; color:#6b4f44">تفاصيل الفاتورة</h3>
        <div id="modalBody"></div>
        <div class="row-grid" style="margin-top:15px">
            <button id="btnEditInv" style="background:#2a9d8f">تعديل 📝</button>
            <button id="btnDelInv" style="background:#d62828; display:none;">حذف 🗑️</button>
        </div>
        <button onclick="document.getElementById('viewModal').style.display='none'" style="background:#555; margin-top:5px">إغلاق</button>
    </div>
</div>

<div id="mainApp" class="box">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
    <div style="font-size:12px">
        <label class="switch"><input type="checkbox" id="langToggle" onchange="window.toggleLang()"><span class="slider"></span></label>
        <span>English</span>
    </div>
    <span id="userNameDisplay" style="font-weight:bold;color:#6b4f44; font-size:12px"></span>
    <button id="logoutBtn" onclick="location.reload()" style="width:auto;padding:3px 10px;background:#eee;color:#333;font-size:10px">خروج</button>
  </div>
  
  <h2 id="mainTitle">عبايات الأمراء</h2>
  <div class="status-text" id="statusLine">⏳ جاري التحميل...</div>
  
  <div class="counter-box" id="counter"></div>

  <div class="row-grid">
    <input id="invNum" class="req" placeholder="رقم الفاتورة *">
    <input id="id" class="req" type="date">
  </div>

  <input id="a" placeholder="اسم الزبونة">
  <input id="b" class="req" placeholder="رقم التلفون *">

  <div class="row-grid">
    <input id="qty" placeholder="عدد العبايات">
    <input id="j" placeholder="رقم كود العباية">
  </div>

  <hr>

  <button type="button" id="btnShowSizes" onclick="toggleSizes()" style="background:#8d7166; font-size:11px; margin:5px 0;">📐 عرض / إخفاء المقاسات</button>
  <div id="sizeSection" class="size-section">
    <div class="size-grid">
        <input id="f1" placeholder="الكتف">
        <input id="f2" placeholder="الكم">
        <input id="f3" placeholder="الصدر">
        <input id="f" placeholder="الطول">
        <input id="f_hole" placeholder="الحفرة">
        <input id="f_shirt" placeholder="طول القميص">
        <input id="f_skirt" placeholder="طول التنورة">
        <input id="f_waist" placeholder="الخصر">
    </div>
  </div>

  <hr>

  <div class="row-grid">
    <input id="g1" class="req" placeholder="العربون *" type="number">
    <input id="g2" class="req" placeholder="المتبقي *" type="number">
    <input id="g3" placeholder="السعر الكامل" readonly style="background:#f1f1f1">
  </div>
  
  <div class="selection-container">
    <div class="selection-row">
      <label><input type="radio" name="loc" value="محل" checked> <span id="txtShop">محل</span></label>
      <label><input type="radio" name="loc" value="معرض"> <span id="txtExh">معرض</span></label>
      <label><input type="radio" name="loc" value="أونلاين"> <span id="txtOnline">أونلاين</span></label>
      |
      <label><input type="checkbox" id="checkOrder"> <span id="txtOrder">أوردر</span></label>
      <label><input type="checkbox" id="checkReady"> <span id="txtReady">جاهز</span></label>
    </div>
  </div>

  <textarea id="k" placeholder="ملاحظات" rows="1"></textarea>
  
  <div class="row-grid">
    <button id="btnSave" style="flex:2;">حفظ الطلب ✅</button>
    <button id="btnClear" style="background:#555;">🧹 تفريغ</button>
  </div>

  <button id="btnDebt" style="background:#d62828; margin-top:5px; padding:8px; font-size:11px;">💰 كشف المديونيات</button>

  <div id="adminPanel" style="display:none;margin-top:5px">
    <div class="row-grid">
      <button id="btnMonthly" style="background:#3a5a40; font-size:11px;">📊 شهري</button>
      <button id="btnYearly" style="background:#3a5a40; font-size:11px;">📅 سنوي</button>
      <button id="btnManageBlacklist" style="background:#000; font-size:11px;">🚫 المحظورين</button>
    </div>
  </div>

  <div id="reportBox" class="report-area">
    <h3 id="reportTitle" style="text-align:center;color:#3a5a40; font-size:14px;"></h3>
    <div id="reportContent" style="overflow-x: auto;"></div>
    <button id="btnExportWord" style="background:#2b5797; font-size:11px;">تحميل Word 📄</button>
    <button onclick="document.getElementById('reportBox').style.display='none'" style="background:#444;">إغلاق</button>
  </div>

  <input id="z" placeholder="🔍 بحث سريع..." style="margin-top:15px">
  
  <table id="mainTable">
    <thead>
        <tr>
            <th id="thInv">فاتورة</th>
            <th id="thName">الاسم</th>
            <th id="thLoc">المكان</th>
            <th id="thBy">بواسطة</th>
            <th id="thRem">المتبقي</th>
            <th id="thView">عرض</th>
        </tr>
    </thead>
    <tbody id="t"></tbody>
  </table>

</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {getDatabase,ref,set,onValue} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDCSx-_o07zM_pqCeIFCdon25k7jQzZMJo",
  authDomain: "alomara-b5b95.firebaseapp.com",
  databaseURL: "https://alomara-b5b95-default-rtdb.firebaseio.com",
  projectId: "alomara-b5b95",
  storageBucket: "alomara-b5b95.firebasestorage.app",
  messagingSenderId: "208627786275",
  appId: "1:208627786275:web:3bd56f7eb2e964773b8796",
  measurementId: "G-2FTVWW4D5B"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.d = [];
window.blacklist = [];
window.role = "";
window.currentUser = "";
let currentLang = 'ar';
let onlyDebt = false;

const T = {
  ar: { title: "عبايات الأمراء", login: "🔐 دخول النظام", status: "✅ متصل - الحفظ تلقائي ☁️", hello: "مرحباً: ", shop:"محل", exh:"معرض", online:"أونلاين", order:"أوردر", ready:"جاهز" },
  en: { title: "Al Omara Abayat", login: "🔐 System Login", status: "✅ Connected - Auto Sync ☁️", hello: "Hi: ", shop:"Shop", exh:"Exh", online:"Online", order:"Order", ready:"Ready" }
};

window.login=()=>{
    let u=document.getElementById('userSelect').value, p=document.getElementById('passInput').value;
    let ok=false, name="";
    if(u==='owner' && p=="4400"){ok=true;name="Amir";}
    else if(u==='naina' && p=="1234"){ok=true;name="Naina";}
    else if(u==='other' && p=="1357"){ok=true;name="Employee";}
    else if(u==='editor' && p=="98988"){ok=true;name="Editor";}
    
    if(ok){
        window.role=u; window.currentUser=name;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainApp').style.display='block';
        if(u==='owner'||u==='editor') {
            document.getElementById('adminPanel').style.display='block';
            document.getElementById('btnDelInv').style.display='block';
        }
        document.getElementById('userNameDisplay').textContent= (T[currentLang].hello || "Hi: ") + name;
        updateCounter();
    } else alert('Error Password!');
};

// تشغيل اللغة
window.toggleLang = () => {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    document.getElementById('mainTitle').innerText = T[currentLang].title;
    document.getElementById('userNameDisplay').textContent = T[currentLang].hello + window.currentUser;
    document.getElementById('txtShop').innerText = T[currentLang].shop;
    document.getElementById('txtExh').innerText = T[currentLang].exh;
    document.getElementById('txtOnline').innerText = T[currentLang].online;
    document.getElementById('txtOrder').innerText = T[currentLang].order;
    document.getElementById('txtReady').innerText = T[currentLang].ready;
    r_table();
};

onValue(ref(db,'abonat'),(s)=>{
    window.d = s.exists() ? s.val() : [];
    document.getElementById('statusLine').innerHTML = T[currentLang].status;
    r_table();
    updateCounter();
});

function updateCounter(){
    if(!window.currentUser) return;
    let tr=0, tp=0; 
    window.d.forEach(u=>{tr+=parseFloat(u.v2)||0; tp+=parseFloat(u.v1)||0;});
    if(window.role === 'owner' || window.role === 'editor') {
        document.getElementById('counter').innerHTML = `#${window.d.length} | Paid: ${tp.toFixed(2)} | Rem: ${tr.toFixed(2)}`;
    } else {
        document.getElementById('counter').innerHTML = `# Total Orders: ${window.d.length}`;
    }
}

// تشغيل التقارير
const showReport = (type) => {
    let now = new Date();
    let filtered = window.d.filter(u => {
        let dDate = new Date(u.id);
        if(type==='monthly') return dDate.getMonth() === now.getMonth() && dDate.getFullYear() === now.getFullYear();
        if(type==='yearly') return dDate.getFullYear() === now.getFullYear();
        return true;
    });
    let total = 0;
    let h = '<table border="1" style="width:100%; border-collapse:collapse"><tr><th>Inv</th><th>Name</th><th>Total</th></tr>';
    filtered.forEach(u => {
        h += `<tr><td>${u.inv}</td><td>${u.n}</td><td>${u.v3}</td></tr>`;
        total += parseFloat(u.v3) || 0;
    });
    h += `<tr><td colspan="2"><b>Total Sum</b></td><td><b>${total.toFixed(2)}</b></td></tr></table>`;
    document.getElementById('reportTitle').innerText = type === 'monthly' ? "التقرير الشهري" : "التقرير السنوي";
    document.getElementById('reportContent').innerHTML = h;
    document.getElementById('reportBox').style.display = 'block';
};

document.getElementById('btnMonthly').onclick = () => showReport('monthly');
document.getElementById('btnYearly').onclick = () => showReport('yearly');

// تشغيل الحظر
document.getElementById('btnManageBlacklist').onclick = () => {
    let num = prompt("أدخل رقم هاتف لحظره أو اتركه فارغاً لرؤية القائمة:");
    if(num) {
        window.blacklist.push(num);
        set(ref(db, 'blacklist'), window.blacklist);
        alert("تم الحظر");
    } else {
        alert("المحظورين: " + window.blacklist.join(", "));
    }
};

window.viewInv = (index) => {
    let u = window.d[index];
    let body = `
        <div class="modal-detail"><b>الفاتورة:</b> <span>${u.inv}</span></div>
        <div class="modal-detail"><b>الاسم:</b> <span>${u.n || '--'}</span></div>
        <div class="modal-detail"><b>الهاتف:</b> <span>${u.p}</span></div>
        <div class="modal-detail"><b>المقاسات:</b> <span>${u.f1}/${u.f2}/${u.f3}/${u.f}</span></div>
        <div class="modal-detail"><b>المدفوع:</b> <span>${u.v1}</span></div>
        <div class="modal-detail"><b>المتبقي:</b> <span style="color:red">${u.v2}</span></div>
        <div class="modal-detail"><b>التاريخ:</b> <span>${u.id}</span></div>
    `;
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('viewModal').style.display = 'block';
    
    document.getElementById('btnEditInv').onclick = () => {
        if(confirm("هل تريد سحب البيانات للتعديل؟")) {
            document.getElementById('invNum').value = u.inv;
            document.getElementById('a').value = u.n || '';
            document.getElementById('b').value = u.p;
            document.getElementById('qty').value = u.qty || '';
            document.getElementById('j').value = u.j || '';
            document.getElementById('f1').value = u.f1 || '';
            document.getElementById('f2').value = u.f2 || '';
            document.getElementById('f3').value = u.f3 || '';
            document.getElementById('f').value = u.f || '';
            document.getElementById('f_hole').value = u.f_hole || '';
            document.getElementById('f_shirt').value = u.f_shirt || '';
            document.getElementById('f_skirt').value = u.f_skirt || '';
            document.getElementById('f_waist').value = u.f_waist || '';
            document.getElementById('g1').value = u.v1 || '';
            document.getElementById('g2').value = u.v2 || '';
            document.getElementById('g3').value = u.v3 || '';
            document.getElementById('id').value = u.id || '';
            document.getElementById('viewModal').style.display = 'none';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    };

    document.getElementById('btnDelInv').onclick = () => {
        if(confirm("سيتم حذف الفاتورة نهائياً؟")) {
            window.d.splice(index, 1);
            set(ref(db, 'abonat'), window.d);
            document.getElementById('viewModal').style.display = 'none';
        }
    };
};

function r_table(){
    let term=document.getElementById('z').value.toLowerCase();
    let fd=window.d.filter(u=> (u.n && u.n.toLowerCase().includes(term)) || (u.p && u.p.includes(term)) || (u.inv && u.inv.includes(term)));
    if(onlyDebt) fd=fd.filter(u=>(parseFloat(u.v2)||0)>0);
    
    let h='';
    fd.forEach(u=>{
        let i=window.d.indexOf(u);
        let isBlocked = window.blacklist.includes(u.p);
        let locMap = { 'محل': T[currentLang].shop, 'معرض': T[currentLang].exh, 'أونلاين': T[currentLang].online };
        let displayLoc = (locMap[u.loc] || u.loc) + (u.isOrder?"+أ":"") + (u.isReady?"+ج":"");
        
        h+=`<tr class="${isBlocked ? 'blocked-row' : ''}">
                <td>${u.inv||'--'}</td>
                <td>${isBlocked ? '🚫 ' : ''}${u.n || 'بدون اسم'}</td>
                <td>${displayLoc}</td>
                <td>${u.by || '--'}</td>
                <td style="color:red;font-weight:bold">${u.v2}</td>
                <td><button onclick="viewInv(${i})" style="padding:4px 8px; font-size:10px; border-radius:5px;">👁️</button></td>
            </tr>`;
    });
    document.getElementById('t').innerHTML=h;
}

document.getElementById('g1').oninput = document.getElementById('g2').oninput = () => {
    let v1=parseFloat(document.getElementById('g1').value)||0, v2=parseFloat(document.getElementById('g2').value)||0;
    document.getElementById('g3').value=(v1+v2).toFixed(2);
};

document.getElementById('btnSave').onclick=()=>{
    let inv=document.getElementById('invNum').value, tel=document.getElementById('b').value, date=document.getElementById('id').value, v1=document.getElementById('g1').value, v2=document.getElementById('g2').value;
    if(!inv || !tel || !date || !v1 || !v2) return alert("Required fields *");
    
    let o={
        inv:inv, n:document.getElementById('a').value, p:tel, qty:document.getElementById('qty').value, j:document.getElementById('j').value, 
        f1:document.getElementById('f1').value, f2:document.getElementById('f2').value, f3:document.getElementById('f3').value, f:document.getElementById('f').value, 
        f_hole:document.getElementById('f_hole').value, f_shirt:document.getElementById('f_shirt').value, f_skirt:document.getElementById('f_skirt').value, f_waist:document.getElementById('f_waist').value,
        v1:v1, v2:v2, v3:document.getElementById('g3').value, loc:document.querySelector('input[name="loc"]:checked').value,
        isOrder: document.getElementById('checkOrder').checked, isReady: document.getElementById('checkReady').checked,
        by:window.currentUser, id:date, month:new Date(date).getMonth()+1, year:new Date(date).getFullYear()
    };

    let existingIndex = window.d.findIndex(item => item.inv === inv);
    if(existingIndex !== -1) {
        if(confirm("تحديث البيانات الحالية؟")) window.d[existingIndex] = o; else return;
    } else {
        window.d.push(o);
    }
    set(ref(db,'abonat'), window.d);
    alert("✅ تم الحفظ");
    document.getElementById('btnClear').click();
};

document.getElementById('btnClear').onclick=()=>{
    ['invNum','a','b','qty','j','f1','f2','f3','f','f_hole','f_shirt','f_skirt','f_waist','g1','g2','g3','id','k'].forEach(i=>{
        if(document.getElementById(i)) document.getElementById(i).value='';
    });
};

document.getElementById('btnDebt').onclick = () => { 
    onlyDebt = !onlyDebt; 
    document.getElementById('btnDebt').innerText = onlyDebt ? "👥 عرض الجميع" : "💰 كشف المديونيات"; 
    r_table(); 
};

window.toggleSizes = () => {
    let s = document.getElementById('sizeSection');
    s.style.display = (s.style.display === 'block') ? 'none' : 'block';
};

document.getElementById('z').oninput = r_table;
onValue(ref(db,'blacklist'),(s)=>{ window.blacklist = s.exists() ? s.val() : []; r_table(); });
</script>
</body>
</html>
