<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abayat Al Omara</title>
<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {getDatabase,ref,set,onValue} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDCSx-_o07zM_pqCeIFCdon25k7jQzZMJo",
  authDomain: "alomara-b5b95.firebaseapp.com",
  databaseURL: "https://alomara-b5b95-default-rtdb.firebaseio.com",
  projectId: "alomara-b5b95",
  storageBucket: "alomara-b5b95.firebasestorage.app",
  messagingSenderId: "208627786275",
  appId: "1:208627786275:web:3bd56f7eb2e964773b8796",
  measurementId: "G-2FTVWW4D5B"
};

let db;
window.ownerPass = "4400";
window.nainaPass = "1234";
window.otherPass = "1357";
window.editorPass = "98988";
window.isDataLoaded = false;

try{
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    onValue(ref(db,'abonat'),(s)=>{
        window.d = s.exists() ? s.val() : [];
        window.isDataLoaded = true;
        document.getElementById('statusLine').innerHTML = "✅ متصل - الحفظ تلقائي ☁️";
        r_table();
        updateCounter();
    }, (error) => {
        document.getElementById('statusLine').innerHTML = "❌ خطأ في الاتصال!";
    });
}catch(e){ console.error("Firebase Error", e); }

window.syncToCloud=()=>{
    if(db && window.isDataLoaded){
        set(ref(db,'abonat'), window.d);
    }
};
</script>
<style>
body{font-family:tahoma;padding:15px;background:#fcfaf8;margin:0}
.box{max-width:550px;margin:auto;background:white;padding:20px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
#loginPage,#mainApp{display:none}
#loginPage{display:block;text-align:center;padding:40px 20px}
h2{text-align:center;color:#6b4f44;margin:5px 0}
.status-text{text-align:center;font-size:11px;color:#2a9d8f;margin-bottom:15px;font-weight:bold}
input,button,textarea,select{width:100%;padding:14px;margin:8px 0;border:1px solid #eee;border-radius:12px;box-sizing:border-box;font-size:14px}
button{background:#6b4f44;color:white;border:none;font-weight:bold;cursor:pointer}
.counter-box{text-align:center;background:#fdf6f2;padding:12px;border-radius:12px;margin-bottom:15px;font-size:13px;color:#6b4f44;font-weight:bold;line-height:2}
.line-separator{border-top:1px solid #ddd;margin:8px 0}
table{width:100%;margin-top:20px;border-collapse:collapse;font-size:11px}
th{background:#fdf6f2;color:#6b4f44;padding:8px}
td{border-bottom:1px solid #f9f9f9;padding:8px;text-align:center}
.report-area{margin-top:20px;padding:15px;background:#fff;border:2px solid #3a5a40;border-radius:15px;display:none}
.switch{position:relative;display:inline-block;width:40px;height:22px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:20px}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%}
input:checked+.slider{background-color:#6b4f44}
input:checked+.slider:before{transform:translateX(18px)}
@media print {
    body * { visibility: hidden; }
    #reportContent, #reportContent * { visibility: visible; }
    #reportContent { position: absolute; left: 0; top: 0; width: 100%; }
}
</style>
</head>
<body>

<div id="loginPage" class="box">
  <h2>🔐 دخول النظام</h2>
  <select id="userSelect">
    <option value="owner">صاحبة الحلال</option>
    <option value="naina">ناينا</option>
    <option value="other">أخرى</option>
    <option value="editor">Editor</option>
  </select>
  <input id="passInput" type="password" placeholder="الرقم السري">
  <button onclick="login()">دخول</button>
</div>

<div id="mainApp" class="box">
  <div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:15px">
    <span>عربي</span>
    <label class="switch"><input type="checkbox" id="langToggle" onchange="toggleLang()"><span class="slider"></span></label>
    <span>English</span>
  </div>
  <h2 id="mainTitle">عبايات الأمراء - الزبائن</h2>
  <div class="status-text" id="statusLine">⏳ جاري التحميل...</div>
  <hr>
  <div class="counter-box" id="counter"></div>

  <input id="invNum" placeholder="رقم الفاتورة">
  <input id="id" type="date">
  <input id="a" placeholder="اسم الزبونة">
  <input id="b" placeholder="رقم التلفون">
  <div style="display:flex;gap:10px">
    <input id="g1" placeholder="العربون" type="number" oninput="calc()">
    <input id="g2" placeholder="المتبقي" type="number" oninput="calc()">
  </div>
  <input id="g3" placeholder="السعر الكامل" readonly style="background:#f9f9f9">
  <button id="btnSave" onclick="s()" style="background:#8b6d5c">حفظ الطلب ✅</button>

  <div id="adminPanel" style="display:none;margin-top:10px">
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      <button style="background:#3a5a40;flex:1;" onclick="generateDetailedReport('monthly')">📊 ريبورت شهري</button>
      <button style="background:#3a5a40;flex:1;" onclick="generateDetailedReport('yearly')">📅 ريبورت سنوي</button>
    </div>
  </div>

  <div id="reportBox" class="report-area">
    <div id="reportContent">
        <h3 id="reportTitle" style="text-align:center;color:#3a5a40;"></h3>
        <div id="reportTableArea"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:15px">
        <button onclick="exportToWord()" style="background:#2b5797;">💾 تحميل Word</button>
        <button onclick="window.print()" style="background:#444;">🖨️ طباعة التقرير</button>
        <button onclick="document.getElementById('reportBox').style.display='none'" style="background:gray;">إغلاق</button>
    </div>
  </div>

  <input id="z" placeholder="🔍 ابحث هنا..." oninput="r_table()" style="margin-top:20px">
  <table>
    <thead><tr><th>الفاتورة</th><th>الاسم</th><th>المتبقي</th><th>عرض</th></tr></thead>
    <tbody id="t"></tbody>
  </table>
</div>

<script>
window.d = [];
let currentLang = 'ar';

function toggleLang() {
  currentLang = document.getElementById('langToggle').checked ? 'en' : 'ar';
  // (تطبيق الترجمة هنا كما في الكود السابق)
}

function login() {
  let u = document.getElementById('userSelect').value;
  let p = document.getElementById('passInput').value;
  if(p==window.ownerPass || p==window.nainaPass || p==window.otherPass || p==window.editorPass){
    window.role=u;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainApp').style.display='block';
    if(u==='owner'||u==='editor') document.getElementById('adminPanel').style.display='block';
    r_table(); updateCounter();
  } else alert("خطأ!");
}

function calc(){
  let v1=parseFloat(document.getElementById('g1').value)||0;
  let v2=parseFloat(document.getElementById('g2').value)||0;
  document.getElementById('g3').value=(v1+v2).toFixed(2);
}

function s(){
  let name=document.getElementById('a').value; if(!name) return alert("الاسم مطلوب");
  let today = new Date();
  let o={
    inv:document.getElementById('invNum').value,
    n:name, v1:document.getElementById('g1').value,
    v2:document.getElementById('g2').value, v3:document.getElementById('g3').value,
    month:today.getMonth()+1, year:today.getFullYear()
  };
  window.d.push(o); window.syncToCloud();
  ['invNum','a','b','g1','g2','g3'].forEach(i=>document.getElementById(i).value='');
  r_table(); updateCounter();
}

function r_table(){
  let h=''; let term=document.getElementById('z').value;
  let fd=window.d.filter(u=>(u.n&&u.n.includes(term))||(u.inv&&u.inv.includes(term)));
  fd.forEach(u=>{
    h+=`<tr><td>${u.inv||'--'}</td><td>${u.n}</td><td style="color:red">${u.v2}</td><td><button onclick="alert('تفاصيل ${u.n}')">عرض</button></td></tr>`;
  });
  document.getElementById('t').innerHTML=h;
}

function generateDetailedReport(type) {
    let now = new Date();
    let cM = now.getMonth() + 1;
    let cY = now.getFullYear();
    let filtered = window.d.filter(u => type === 'monthly' ? (u.month === cM && u.year === cY) : u.year === cY);
    
    let totalSales = 0, totalPaid = 0, totalRem = 0;
    let tableHtml = `<table border="1" style="width:100%; border-collapse:collapse; font-family:Arial;">
        <thead><tr style="background:#f2f2f2;"><th>Invoice</th><th>Customer</th><th>Paid</th><th>Remaining</th><th>Total</th></tr></thead><tbody>`;
    
    filtered.forEach(u => {
        let v1 = parseFloat(u.v1) || 0; let v2 = parseFloat(u.v2) || 0; let v3 = parseFloat(u.v3) || 0;
        totalSales += v3; totalPaid += v1; totalRem += v2;
        tableHtml += `<tr><td>${u.inv || '-'}</td><td>${u.n}</td><td>${v1}</td><td>${v2}</td><td>${v3}</td></tr>`;
    });

    tableHtml += `</tbody></table><div style="margin-top:10px;"><b>إجمالي المبيعات: ${totalSales.toFixed(2)}</b><br><b>المحصل: ${totalPaid.toFixed(2)}</b><br><b style="color:red">المديونيات: ${totalRem.toFixed(2)}</b></div>`;
    
    document.getElementById('reportTitle').innerText = (type === 'monthly' ? "تقرير شهر " + cM : "تقرير سنة " + cY);
    document.getElementById('reportTableArea').innerHTML = tableHtml;
    document.getElementById('reportBox').style.display = 'block';
}

function exportToWord() {
    let header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Report</title></head><body>";
    let footer = "</body></html>";
    let sourceHTML = header + document.getElementById("reportContent").innerHTML + footer;
    
    let source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
    let fileDownload = document.createElement("a");
    document.body.appendChild(fileDownload);
    fileDownload.href = source;
    fileDownload.download = 'Abayat-Omara-Report.doc';
    fileDownload.click();
    document.body.removeChild(fileDownload);
}

function updateCounter(){
    let tr=0,tp=0;
    window.d.forEach(u=>{tr+=parseFloat(u.v2)||0;tp+=parseFloat(u.v1)||0;});
    document.getElementById('counter').innerHTML=`زبائننا: ${window.d.length} | المحصل: ${tp.toFixed(2)} | المتبقي: ${tr.toFixed(2)}`;
}
</script>
</body>
</html>
